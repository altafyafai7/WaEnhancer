name: Android CI

on:
  workflow_dispatch:
jobs:
  build:
    permissions: write-all
    runs-on: ubuntu-latest
    env:
      BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN || secrets.BOT_TOKEN }}
      CHANNEL_ID: ${{ secrets.MESSAGE_ID || secrets.CHANNEL_ID }}
      GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
    if: github.event_name == 'workflow_dispatch' && !contains(github.event.head_commit.message, 'Merge')
    steps:
      - uses: actions/checkout@v6
      - name: set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
          cache-dependency-path: |
            **/*.gradle*
            **/gradle-wrapper.properties
            gradle/libs.versions.toml
            **/gradle.properties

      - name: Write key
        if: github.event_name != 'pull_request'
        env:
          KEY_STORE: ${{ secrets.KEY_STORE }}
        run: |
          if [ ! -z "$KEY_STORE" ]; then
          echo androidStorePassword='${{ secrets.KEY_STORE_PASSWORD }}' >> gradle.properties
          echo androidKeyAlias='${{ secrets.ALIAS }}' >> gradle.properties
          echo androidKeyPassword='${{ secrets.KEY_PASSWORD }}' >> gradle.properties
          echo androidStoreFile='key.jks' >> gradle.properties
          echo "$KEY_STORE" | base64 --decode > key.jks
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build all flavor variants
        run: |
          ./gradlew assembleWhatsappDebug assembleBusinessDebug -Pminify=true

      - name: Get short SHA
        run: echo "SHORT_SHA=`echo ${GITHUB_SHA} | cut -c1-7`" >> $GITHUB_ENV

      - name: Generate dynamic changelog
        run: |
          echo "### 🚀 WaEnhancer Build ${{ env.SHORT_SHA }}" > release_body.md
          echo "" >> release_body.md
          echo "#### 📝 Latest Changes" >> release_body.md
          echo "\`\`\`" >> release_body.md
          git log -1 --pretty=format:"%s%n%b" >> release_body.md
          echo "\`\`\`" >> release_body.md
          echo "" >> release_body.md
          echo "#### ✅ Supported Versions" >> release_body.md
          echo "* WhatsApp: 2.26.13.xx" >> release_body.md
          echo "* WhatsApp Business: 2.26.13.xx" >> release_body.md
          echo "" >> release_body.md
          echo "#### ✨ Highlights" >> release_body.md
          cat changelog.txt >> release_body.md

      - name: Upload WhatsApp flavor artifacts
        uses: actions/upload-artifact@v5
        with:
          name: whatsapp-debug-app-${{ env.SHORT_SHA }}
          path: app/build/outputs/apk/whatsapp/debug/app-whatsapp-debug.apk

      - name: Upload Business flavor artifacts
        uses: actions/upload-artifact@v5
        with:
          name: business-debug-app-${{ env.SHORT_SHA }}
          path: app/build/outputs/apk/business/debug/app-business-debug.apk

      - name: Upload to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ env.GH_TOKEN }}
          name: WaEnhancer ${{ env.SHORT_SHA }} [2.26.13.xx]
          body_path: release_body.md
          files: |
            app/build/outputs/apk/whatsapp/debug/app-whatsapp-debug.apk
            app/build/outputs/apk/business/debug/app-business-debug.apk
          tag_name: debug-${{ env.SHORT_SHA }}

      - name: Read release body
        if: ${{ success() && env.BOT_TOKEN != '' && env.CHANNEL_ID != '' }}
        id: release_body
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('release_body.md', 'utf8').trim();
            core.setOutput('content', body);

      - name: Post to Telegram channel
        if: ${{ success() && env.BOT_TOKEN != '' && env.CHANNEL_ID != '' }}
        uses: Dev4Mod/telegram-github-action@master
        with:
          to: ${{ env.CHANNEL_ID }}
          token: ${{ env.BOT_TOKEN }}
          format: markdown
          disable_web_page_preview: true
          message: |
            ${{ steps.release_body.outputs.content }}

            📦 **Release Link:** https://github.com/${{ github.repository }}/releases/tag/debug-${{ env.SHORT_SHA }}

      - name: Upload APKs to Telegram
        if: ${{ success() && env.BOT_TOKEN != '' && env.CHANNEL_ID != '' }}
        run: |
          curl -F document=@app/build/outputs/apk/whatsapp/debug/app-whatsapp-debug.apk \
               -F chat_id="${{ env.CHANNEL_ID }}" \
               -F caption="🟢 WhatsApp APK (2.26.13.xx)" \
               https://api.telegram.org/bot${{ env.BOT_TOKEN }}/sendDocument
          
          curl -F document=@app/build/outputs/apk/business/debug/app-business-debug.apk \
               -F chat_id="${{ env.CHANNEL_ID }}" \
               -F caption="🔵 Business APK (2.26.13.xx)" \
               https://api.telegram.org/bot${{ env.BOT_TOKEN }}/sendDocument
